<!DOCTYPE html>
<html>
<head>
  <title>Skylar</title>

  <!-- CLEAN FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      color: #eaeaea;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* INTRO */
    .intro {
      position: fixed;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f0f0f;
      cursor: pointer;
      z-index: 10;
      transition: opacity 0.6s ease;
    }

    .intro h1 {
      font-size: 14px;
      letter-spacing: 3px;
      font-weight: 400;
      opacity: 0.6;
    }

    /* LAYOUT */
    .container {
      max-width: 700px;
      margin: auto;
      padding: 120px 20px;
      display: none;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* HERO */
    h1 {
      font-size: 42px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .subtitle {
      opacity: 0.6;
      font-size: 15px;
    }

    /* SECTION */
    .section {
      margin-top: 80px;
    }

    .section h2 {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.4;
      margin-bottom: 20px;
    }

    /* PROJECT LIST */
    .project {
      margin-bottom: 20px;
    }

    .project-title {
      font-weight: 500;
    }

    .project-desc {
      opacity: 0.6;
      font-size: 14px;
    }

    /* LINKS */
    .links a {
      display: block;
      margin-bottom: 10px;
      color: #eaeaea;
      text-decoration: none;
      opacity: 0.7;
      transition: 0.2s;
    }

    .links a:hover {
      opacity: 1;
      transform: translateX(5px);
    }

    /* DIVIDER */
    .divider {
      height: 1px;
      background: #1c1c1c;
      margin: 40px 0;
    }
  </style>
</head>

<body>

<!-- INTRO -->
<div class="intro" onclick="enter()">
  <h1>ENTER</h1>
</div>

<!-- MAIN -->
<div class="container" id="main">

  <!-- HERO -->
  <h1>Skylar</h1>
  <div class="subtitle">building things on the internet</div>

  <div class="divider"></div>

  <!-- ABOUT -->
  <div class="section">
    <h2>about</h2>
    <p style="opacity:0.7;">
      i like creating things, experimenting with code,
      and turning ideas into something real.
    </p>
  </div>

  <!-- PROJECTS -->
  <div class="section">
    <h2>projects</h2>

    <div class="project">
      <div class="project-title">chat app</div>
      <div class="project-desc">real-time messaging system built with firebase</div>
    </div>

    <div class="project">
      <div class="project-title">this site</div>
      <div class="project-desc">minimal personal website</div>
    </div>

  </div>

  <!-- LINKS -->
  <div class="section links">
    <h2>links</h2>

    <a href="#">github</a>
    <a href="#">discord</a>
    <a href="#">youtube</a>

  </div>

</div>

<script>
function enter() {
  const intro = document.querySelector(".intro");
  intro.style.opacity = "0";

  setTimeout(() => {
    intro.style.display = "none";
    document.getElementById("main").style.display = "block";
  }, 600);
}
</script>

</body>
</html>
