<!DOCTYPE html>
<html>
<head>
  <title>Skylar</title>
  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      overflow: hidden;
    }

    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .intro {
      position: fixed;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      background: black;
      z-index: 10;
      transition: opacity 0.5s;
    }

    .main {
      display: none;
      text-align: center;
      margin-top: 30vh;
    }

    #messages {
      height: 200px;
      overflow-y: auto;
      border: 1px solid white;
      padding: 10px;
      margin: 10px;
    }
  </style>
</head>

<body>

<div id="particles-js"></div>

<div class="intro" onclick="enter()">
  <h1>click to enter</h1>
</div>

<div class="main" id="main">
  <h1>SKYLAR</h1>
  <p>archive</p>

  <button onclick="login()">Login with Google</button>
  <p id="user"></p>

  <h3>Chat</h3>
  <div id="messages"></div>

  <input id="msg" placeholder="Type message..." />
  <button onclick="send()">Send</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDNLXgaWzTVpW3fofikKzTzjtaOJcLggaI",
  authDomain: "skylar-site-40707.firebaseapp.com",
  projectId: "skylar-site-40707"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function enter() {
  const intro = document.querySelector(".intro");
  const main = document.getElementById("main");

  intro.style.pointerEvents = "none";
  intro.style.opacity = "0";

  setTimeout(() => {
    intro.style.display = "none";
    main.style.display = "block";
  }, 500);
}

function login() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).then(result => {
    document.getElementById("user").innerText =
      "Logged in as " + result.user.displayName;
  });
}

function send() {
  const input = document.getElementById("msg");

  if (!input.value) return;

  if (!auth.currentUser) {
    alert("Login first!");
    return;
  }

  db.collection("messages").add({
    text: input.value,
    name: auth.currentUser.displayName,
    time: Date.now()
  });

  input.value = "";
}

db.collection("messages")
  .orderBy("time")
  .onSnapshot(snapshot => {
    const box = document.getElementById("messages");
    box.innerHTML = "";

    snapshot.forEach(doc => {
      const msg = doc.data();
      const p = document.createElement("p");
      p.textContent = msg.name + ": " + msg.text;
      box.appendChild(p);
    });

    box.scrollTop = box.scrollHeight;
  });

particlesJS("particles-js", {
  particles: {
    number: { value: 40 },
    size: { value: 2 },
    move: { speed: 1 }
  }
});
</script>

</body>
</html>
