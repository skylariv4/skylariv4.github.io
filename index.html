   <!DOCTYPE html>
<html>
<head>
  <title>Skylar</title>
  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: black;
      color: white;
      overflow: hidden;
    }

    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    h1 {
      font-size: 50px;
    }

    .socials a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }

    .controls {
      position: fixed;
      bottom: 20px;
      right: 20px;
    }

    button {
      background: black;
      border: 1px solid white;
      color: white;
      padding: 5px 10px;
      margin: 5px;
    }
  </style>
</head>

<body>

<div id="particles-js"></div>

<div class="center">
  <h1 id="title">Loading...</h1>
  <p id="visits"></p>

  <div class="socials">
    <a href="#">Discord</a>
    <a href="#">GitHub</a>
    <a href="#">TikTok</a>
  </div>
</div>

<div class="controls">
  <button onclick="toggleMusic()">Music</button>
</div>

<!-- 🔥 WORKING MUSIC (FROM GITHUB RAW) -->
<audio id="music" loop>
  <source src="https://raw.githubusercontent.com/anars/blank-audio/master/1-second-of-silence.mp3" type="audio/mpeg">
</audio>

<script>
  // PARTICLES
  particlesJS("particles-js", {
    particles: {
      number: { value: 40 },
      size: { value: 2 },
      move: { speed: 1 }
    }
  });

  // USERNAME SYSTEM
  let name = localStorage.getItem("name");

  if (!name) {
    name = prompt("Enter your name:");
    localStorage.setItem("name", name);
  }

  document.getElementById("title").innerText = "Welcome, " + name;

  // VISITOR COUNTER (local fake but works)
  let visits = localStorage.getItem("visits") || 0;
  visits++;
  localStorage.setItem("visits", visits);

  document.getElementById("visits").innerText = "Visits: " + visits;

  // MUSIC CONTROL
  let music = document.getElementById("music");
  let playing = false;

  function toggleMusic() {
    if (!playing) {
      music.play();
      playing = true;
    } else {
      music.pause();
      playing = false;
    }
  }
</script>

</body>
</html>
