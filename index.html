<!DOCTYPE html>
<html>
<head>
  <title>Skylar Ultimate</title>
  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      color: #00ffcc;
      font-family: monospace;
      display: flex;
      height: 100vh;
    }

    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .sidebar {
      width: 200px;
      border-right: 1px solid #00ffcc;
      padding: 10px;
    }

    .channel {
      cursor: pointer;
      margin: 5px 0;
    }

    .channel:hover {
      color: white;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .msg { margin-bottom: 8px; }
    .name { color: #00ffcc; }
    .text { color: white; }

    input {
      background: black;
      border: 1px solid #00ffcc;
      color: white;
      padding: 5px;
    }

    button {
      background: black;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      cursor: pointer;
    }

    #topbar {
      border-bottom: 1px solid #00ffcc;
      padding: 5px;
    }
  </style>
</head>

<body>

<div id="particles-js"></div>

<div class="sidebar">
  <h3>Channels</h3>
  <div class="channel" onclick="switchRoom('global')"># global</div>
  <div class="channel" onclick="switchRoom('gaming')"># gaming</div>
  <div class="channel" onclick="switchRoom('random')"># random</div>

  <h3>Users</h3>
  <div id="users"></div>
</div>

<div class="main">
  <div id="topbar">
    <button onclick="login()">Login</button>
    <span id="user"></span>
  </div>

  <div id="messages"></div>

  <input id="msg" placeholder="Type..." />
  <input id="img" placeholder="Image URL (optional)" />
  <button onclick="send()">Send</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR KEY",
  authDomain: "YOUR DOMAIN",
  projectId: "YOUR PROJECT ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentRoom = "global";
let lastMessageTime = 0;

/* LOGIN */
function login() {
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider).then(result => {
    const user = result.user;

    document.getElementById("user").innerText = user.displayName;

    db.collection("users").doc(user.uid).set({
      name: user.displayName,
      photo: user.photoURL
    });

    db.collection("online").doc(user.uid).set({
      name: user.displayName,
      photo: user.photoURL
    });
  });
}

/* AUTO ONLINE CLEAN */
auth.onAuthStateChanged(user => {
  if (user) {
    db.collection("online").doc(user.uid).set({
      name: user.displayName,
      photo: user.photoURL
    });

    window.addEventListener("beforeunload", () => {
      db.collection("online").doc(user.uid).delete();
    });
  }
});

/* SWITCH ROOM */
function switchRoom(room) {
  currentRoom = room;
  loadMessages();
}

/* SEND MESSAGE */
function send() {
  const now = Date.now();

  if (now - lastMessageTime < 2000) {
    alert("Slow down bro 😭");
    return;
  }

  lastMessageTime = now;

  const text = document.getElementById("msg").value;
  const img = document.getElementById("img").value;

  if (!auth.currentUser) return alert("Login first!");

  db.collection("messages").add({
    text,
    img,
    room: currentRoom,
    name: auth.currentUser.displayName,
    photo: auth.currentUser.photoURL,
    time: now,
    uid: auth.currentUser.uid
  });

  document.getElementById("msg").value = "";
  document.getElementById("img").value = "";
}

/* DELETE MESSAGE */
function del(id) {
  db.collection("messages").doc(id).delete();
}

/* LOAD MESSAGES */
function loadMessages() {
  db.collection("messages")
    .where("room", "==", currentRoom)
    .orderBy("time")
    .limit(50)
    .onSnapshot(snapshot => {
      const box = document.getElementById("messages");
      box.innerHTML = "";

      snapshot.forEach(doc => {
        const msg = doc.data();

        const div = document.createElement("div");
        div.className = "msg";

        div.innerHTML = `
          <img src="${msg.photo}" width="20">
          <span class="name">${msg.name}:</span>
          <span class="text">${msg.text}</span>
          ${msg.img ? `<br><img src="${msg.img}" width="100">` : ""}
          ${
            msg.uid === auth.currentUser?.uid
              ? `<button onclick="del('${doc.id}')">X</button>`
              : ""
          }
        `;

        box.appendChild(div);
      });

      box.scrollTop = box.scrollHeight;
    });
}

/* ONLINE USERS */
db.collection("online").onSnapshot(snapshot => {
  const box = document.getElementById("users");
  box.innerHTML = "";

  snapshot.forEach(doc => {
    const user = doc.data();
    const div = document.createElement("div");

    div.innerHTML = `<img src="${user.photo}" width="15"> ${user.name}`;
    box.appendChild(div);
  });
});

/* INIT */
loadMessages();

/* PARTICLES */
particlesJS("particles-js", {
  particles: {
    number: { value: 40 },
    size: { value: 2 },
    move: { speed: 1 }
  }
});
</script>

</body>
</html>
