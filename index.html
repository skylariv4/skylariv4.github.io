<!DOCTYPE html>
<html>
<head>
  <title>Skylar's Site</title>

  <!-- particles.js library -->
  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
    }

    /* PARTICLES BACKGROUND */
    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0f2027, #2c5364);
      z-index: -1;
    }

    .container {
      position: relative;
      text-align: center;
      margin-top: 120px;
    }

    h1 {
      font-size: 50px;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #00f2ff; }
      to { text-shadow: 0 0 30px #00f2ff, 0 0 60px #00f2ff; }
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 25px;
      background: #00f2ff;
      color: black;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: white;
      transform: scale(1.1);
    }
  </style>
</head>

<body>

  <!-- PARTICLES -->
  <div id="particles-js"></div>

  <div class="container">
    <h1>Skylar </h1>
    <p>Now with moving particles</p>
    <button onclick="clickMe()">Click Me</button>
  </div>

  <script>
    function clickMe() {
      alert("Particles go brrrr ");
    }

    particlesJS("particles-js", {
      particles: {
        number: { value: 80 },
        size: { value: 3 },
        move: { speed: 2 },
        line_linked: {
          enable: true,
          distance: 150
        }
      }
    });
  </script>

</body>
</html>
