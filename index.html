<!DOCTYPE html>
<html>
<head>
  <title>Skylar</title>
  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      overflow: hidden;
    }

    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .intro {
      position: fixed;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      background: black;
    }

    .main {
      display: none;
      text-align: center;
      margin-top: 40vh;
    }
  </style>
</head>

<body>

<div id="particles-js"></div>

<div class="intro" onclick="enter()">
  <h1>click to enter</h1>
</div>

<div class="main" id="main">
  <h1>SKYLAR</h1>
  <p>archive</p>
</div>

<script>
function enter() {
  document.querySelector(".intro").style.display = "none";
  document.getElementById("main").style.display = "block";
}

particlesJS("particles-js", {
  particles: {
    number: { value: 40 },
    size: { value: 2 },
    move: { speed: 1 }
  }
});
</script>

</body>
</html>
