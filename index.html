<!DOCTYPE html>
<html>
<head>
  <title>Skylar</title>
  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: black;
      color: white;
      overflow-x: hidden;
    }

    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .main {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      animation: fadeIn 2s ease;
    }

    h1 {
      font-size: 60px;
      letter-spacing: 5px;
    }

    p {
      opacity: 0.6;
      margin-top: 10px;
    }

    .btn {
      margin-top: 25px;
      padding: 10px 25px;
      border: 1px solid white;
      background: transparent;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
      color: black;
    }

    .section {
      padding: 100px 20px;
      text-align: center;
      opacity: 0;
      transform: translateY(50px);
      transition: 1s;
    }

    .section.show {
      opacity: 1;
      transform: translateY(0);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>

<body>

<div id="particles-js"></div>

<div class="main">
  <h1>SKYLAR</h1>
  <p>minimal. clean. smooth.</p>
  <button class="btn" onclick="scrollDown()">Enter</button>
</div>

<div class="section">
  <h2>About</h2>
  <p>I build cool things on the internet.</p>
</div>

<div class="section">
  <h2>Projects</h2>
  <p>More coming soon...</p>
</div>

<script>
  function scrollDown() {
    window.scrollTo({ top: window.innerHeight, behavior: "smooth" });
  }

  // particles config (clean + subtle)
  particlesJS("particles-js", {
    particles: {
      number: { value: 50 },
      size: { value: 2 },
      move: { speed: 1 },
      line_linked: { enable: false }
    }
  });

  // scroll animation
  const sections = document.querySelectorAll(".section");

  window.addEventListener("scroll", () => {
    sections.forEach(sec => {
      const top = sec.getBoundingClientRect().top;
      if (top < window.innerHeight - 100) {
        sec.classList.add("show");
      }
    });
  });
</script>

</body>
</html>
