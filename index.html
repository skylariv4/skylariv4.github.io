<!DOCTYPE html>
<html>
<head>
  <title>Skylar</title>
  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: black;
      color: white;
      overflow: hidden;
      cursor: none;
    }

    /* CUSTOM CURSOR */
    .cursor {
      width: 10px;
      height: 10px;
      background: white;
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: 0.05s;
      z-index: 999;
    }

    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      animation: fadeIn 2s ease;
    }

    h1 {
      font-size: 60px;
      letter-spacing: 6px;
    }

    .typing {
      opacity: 0.7;
      margin-top: 10px;
      font-size: 18px;
      border-right: 2px solid white;
      display: inline-block;
      padding-right: 5px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { border-color: transparent; }
    }

    .socials {
      margin-top: 30px;
    }

    .socials a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: 0.3s;
    }

    .socials a:hover {
      border-bottom: 1px solid white;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translate(-50%, -60%); }
      to { opacity: 1; transform: translate(-50%, -50%); }
    }
  </style>
</head>

<body>

<div id="particles-js"></div>
<div class="cursor" id="cursor"></div>

<div class="center">
  <h1>SKYLAR</h1>
  <div class="typing" id="typing"></div>

  <div class="socials">
    <a href="#">Discord</a>
    <a href="#">GitHub</a>
    <a href="#">TikTok</a>
  </div>
</div>

<script>
  // PARTICLES (super subtle like that site)
  particlesJS("particles-js", {
    particles: {
      number: { value: 40 },
      size: { value: 2 },
      move: { speed: 0.8 },
      opacity: { value: 0.3 },
      line_linked: { enable: false }
    }
  });

  // TYPING EFFECT
  const text = "welcome to my space...";
  let i = 0;

  function type() {
    if (i < text.length) {
      document.getElementById("typing").innerHTML += text.charAt(i);
      i++;
      setTimeout(type, 50);
    }
  }

  type();

  // CUSTOM CURSOR
  const cursor = document.getElementById("cursor");

  document.addEventListener("mousemove", e => {
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
  });
</script>

</body>
</html>
