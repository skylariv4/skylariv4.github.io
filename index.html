<!DOCTYPE html>
<html>
<head>
  <title>Skylar</title>

  <style>
    body {
      margin: 0;
      color: #eaeaea;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      overflow-x: hidden;
      cursor: none;
    }

    /* ANIMATED BACKGROUND */
    body::before {
      content: "";
      position: fixed;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 30%, #1a1a1a, #0d0d0d);
      animation: moveBg 20s infinite linear;
      z-index: -1;
    }

    @keyframes moveBg {
      0% { transform: translate(0,0); }
      50% { transform: translate(-10%, -10%); }
      100% { transform: translate(0,0); }
    }

    /* CUSTOM CURSOR */
    .cursor {
      width: 12px;
      height: 12px;
      border: 1px solid #eaeaea;
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease;
      z-index: 999;
    }

    /* INTRO */
    .intro {
      position: fixed;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0d0d0d;
      cursor: pointer;
      z-index: 10;
      transition: 0.6s ease;
    }

    .intro h1 {
      letter-spacing: 3px;
      opacity: 0.6;
      transition: 0.3s;
    }

    .intro:hover h1 {
      opacity: 1;
      transform: scale(1.05);
    }

    /* MAIN */
    .main {
      display: none;
      text-align: center;
      padding: 120px 20px;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 48px;
    }

    p {
      opacity: 0.65;
    }

    .section {
      margin-top: 80px;
    }

    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border-radius: 14px;
      padding: 25px;
      margin: 20px auto;
      max-width: 500px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-6px) scale(1.01);
    }

    .links a {
      margin: 10px;
      color: #eaeaea;
      text-decoration: none;
      position: relative;
    }

    .links a::after {
      content: "";
      position: absolute;
      width: 0%;
      height: 1px;
      bottom: -3px;
      left: 0;
      background: #eaeaea;
      transition: 0.3s;
    }

    .links a:hover::after {
      width: 100%;
    }

    /* MUSIC BUTTON */
    .music {
      position: fixed;
      bottom: 20px;
      right: 20px;
      opacity: 0.5;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<div class="intro" onclick="enter()">
  <h1>enter</h1>
</div>

<div class="main" id="main">
  <h1>Skylar</h1>
  <p>building things, one step at a time</p>

  <div class="section card">
    <p>
      i like coding, experimenting, and creating random stuff.
      this is my space.
    </p>
  </div>

  <div class="section card">
    <h2>projects</h2>
    <p>chat app — real-time system</p>
    <p>this site — minimal aesthetic</p>
  </div>

  <div class="section links">
    <h2>links</h2>
    <a href="#">github</a>
    <a href="#">discord</a>
    <a href="#">youtube</a>
  </div>
</div>

<!-- MUSIC -->
<audio id="music" src="https://files.catbox.moe/8f3h1c.mp3"></audio>
<div class="music" onclick="toggleMusic()">♪</div>

<script>
function enter() {
  const intro = document.querySelector(".intro");
  intro.style.opacity = "0";

  setTimeout(() => {
    intro.style.display = "none";
    document.getElementById("main").style.display = "block";
  }, 600);
}

/* CURSOR */
const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

/* MUSIC */
function toggleMusic() {
  const m = document.getElementById("music");
  if (m.paused) m.play();
  else m.pause();
}
</script>

</body>
</html>
